<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz Cumpleaños Laura</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="loader-wrapper">
        <div class="sunflower-loader">🌻</div>
    </div>

    <main class="container fade-in">
        <div class="glass-card">
            <h1 class="title">Feliz cumpleaños, Laura ❤️</h1>
            <p id="typing-text" class="message"></p>
            
            <div class="controls">
                <button id="music-btn" class="btn">Reproducir música 🎵</button>
                <audio id="bg-music" src="assets/musica.mp3" loop></audio>
            </div>
        </div>
    </main>

    <div class="sunflower-bg" id="sunflower-container"></div>

    <script src="script.js"></script>
</body>
</html>
